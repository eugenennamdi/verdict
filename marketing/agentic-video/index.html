<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verdict Agentic Video</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Geist', sans-serif;
      background-color: #0B0F19; /* Verdict Dark Slate */
      color: white;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 1920px;
      height: 1080px;
      position: relative;
    }

    /* Grid Background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-size: 100px 100px;
      background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
      z-index: 0;
    }

    /* Keyframes */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 
      0% { opacity: 0; transform: scale(0.9); } 
      50% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); } 
    }
    @keyframes drawLine { from { width: 0; } to { width: 400px; } }
    @keyframes pulseGlow { 
      0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); } 
      70% { box-shadow: 0 0 0 30px rgba(249, 115, 22, 0); } 
      100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } 
    }
    @keyframes moveToken {
      0% { opacity: 0; left: -20px; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; left: 380px; }
    }
    
    /* Scene Containers */
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      z-index: 10;
    }

    /* Scene 1: 0s to 4s */
    #scene1 { animation: fadeIn 0.5s forwards, fadeOut 0.5s 3.5s forwards; }
    #scene1-title { animation: slideUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    #agent-node-initial { animation: popIn 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

    /* Scene 2 & 3 & 4 (The Architecture): 4s to 18s */
    #scene2 { animation: fadeIn 0.5s 4s forwards, fadeOut 0.5s 17.5s forwards; }
    
    .node {
      width: 240px;
      height: 240px;
      background: white;
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      color: #0B0F19;
      position: relative;
    }
    .node.dark-node {
      background: #0B0F19;
      border: 4px solid #1e293b;
      color: white;
    }
    .node.dark-node.active {
      border-color: #f97316; /* Verdict Orange */
      animation: pulseGlow 2s infinite;
    }

    /* Node entry animations */
    #s2-agent-node { opacity: 0; animation: popIn 0.8s 4.2s forwards; }
    #s2-line { 
      width: 0; height: 4px; 
      border-bottom: 6px dashed #475569; 
      margin: 0 30px; 
      opacity: 0; 
      animation: fadeIn 0.1s 4.8s forwards, drawLine 1s 4.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
      position: relative;
    }
    #s2-verdict-node { opacity: 0; animation: popIn 0.8s 5.5s forwards; }
    
    /* Scene 3: Token Animation */
    .token-pill {
      position: absolute;
      top: -24px;
      left: 0;
      background: #f97316;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
      opacity: 0;
    }
    /* Token moves from 7s to 9s */
    #token { animation: moveToken 2s 7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    
    /* Verdict Node becomes active at 8.8s (when token arrives) */
    .activate-node { animation: activateBorder 0.2s 8.8s forwards; }
    @keyframes activateBorder { to { border-color: #f97316; } }

    /* Scene 4: Action Card */
    #action-card {
      position: absolute;
      left: 70%;
      background: white;
      color: #0B0F19;
      border-radius: 30px;
      padding: 40px;
      width: 480px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      opacity: 0;
      animation: popIn 0.8s 9.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .check-item { opacity: 0; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; font-size: 24px; font-weight: 600; color: #475569; }
    .check-item:last-child { margin-bottom: 0; }
    
    #chk1 { animation: slideUp 0.5s 10.5s forwards; }
    #chk2 { animation: slideUp 0.5s 12s forwards; }
    #chk3 { animation: slideUp 0.5s 14s forwards; }
    
    .check-circle {
      width: 40px; height: 40px; border-radius: 50%; border: 4px solid #cbd5e1;
      display: flex; justify-content: center; align-items: center;
    }
    .check-fill { animation: fillCheck 0.3s forwards; }
    @keyframes fillCheck { to { background: #f97316; border-color: #f97316; } }
    @keyframes colorText { to { color: #0B0F19; } }
    
    #chk1 .check-circle { animation: fillCheck 0.3s 11.2s forwards; }
    #chk1.check-item { animation: slideUp 0.5s 10.5s forwards, colorText 0.3s 11.2s forwards; }
    
    #chk2 .check-circle { animation: fillCheck 0.3s 12.8s forwards; }
    #chk2.check-item { animation: slideUp 0.5s 12s forwards, colorText 0.3s 12.8s forwards; }
    
    #chk3 .check-circle { animation: fillCheck 0.3s 15s forwards; }
    #chk3.check-item { animation: slideUp 0.5s 14s forwards, colorText 0.3s 15s forwards; }

    /* Scene 5: Outro (18s to 22s) */
    #scene5 { animation: fadeIn 0.5s 18s forwards; }
    #s5-logo { opacity: 0; animation: popIn 1s 18.2s forwards, pulseGlow 2s 18.2s infinite; }
    #s5-text { opacity: 0; animation: slideUp 0.8s 18.8s forwards; }
    #s5-cta { opacity: 0; animation: slideUp 0.8s 19.4s forwards; }

  </style>
</head>
<body>

  <div class="bg-grid"></div>

  <!-- SCENE 1: The Hook -->
  <div id="scene1" class="scene">
    <div id="scene1-title" class="text-7xl font-black mb-16 text-center leading-tight">
      Your agent doesn't just chat.<br>
      <span class="text-slate-400">It executes.</span>
    </div>
    
    <div id="agent-node-initial" class="node">
      <svg class="w-24 h-24 text-slate-800 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0 1 12 15a9.065 9.065 0 0 0-3.23-.693L5 14.5m14.8.8 1.49.373c.114.028.181.144.136.255l-1.293 3.233m-15.14-3.856-1.49.373c-.114.028-.181.144-.136.255l1.293 3.233M12 15v6m0-6a9.06 9.06 0 0 0 3.23.693l2.36.59m-5.59-1.283a9.06 9.06 0 0 1-3.23.693l-2.36.59" />
      </svg>
      <div class="text-3xl font-bold">Your Agent</div>
    </div>
  </div>

  <!-- SCENE 2, 3, 4: Architecture & Flow -->
  <div id="scene2" class="scene" style="flex-direction: row; padding-right: 300px;">
    
    <!-- Agent Node -->
    <div id="s2-agent-node" class="node">
      <svg class="w-24 h-24 text-slate-800 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0 1 12 15a9.065 9.065 0 0 0-3.23-.693L5 14.5m14.8.8 1.49.373c.114.028.181.144.136.255l-1.293 3.233m-15.14-3.856-1.49.373c-.114.028-.181.144-.136.255l1.293 3.233M12 15v6m0-6a9.06 9.06 0 0 0 3.23.693l2.36.59m-5.59-1.283a9.06 9.06 0 0 1-3.23.693l-2.36.59" />
      </svg>
      <div class="text-3xl font-bold">Your Agent</div>
    </div>

    <!-- Dashed Line -->
    <div id="s2-line">
      <!-- Animated Token -->
      <div id="token" class="token-pill text-2xl">
        <svg viewBox="0 0 339.43 295.27" class="w-8 h-8 text-white bg-[#26A17B] rounded-full p-1" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M191.19,144.8v0c-1.2.09-7.4,0.46-21.23,0.46-11,0-18.81-.33-21.55-0.46v0c-42.51-1.87-74.24-9.27-74.24-18.13s31.73-16.25,74.24-18.15v28.91c2.78,0.2,10.74.67,21.74,0.67,13.2,0,19.81-.55,21-0.66v-28.9c42.42,1.89,74.08,9.29,74.08,18.13s-31.65,16.24-74.08,18.12h0Zm0-39.25V79.68h59.2V40.23H89.21V79.68H148.4v25.86c-48.11,2.21-84.29,11.74-84.29,23.16s36.18,20.94,84.29,23.16v82.9h42.78V151.83c48-2.21,84.12-11.73,84.12-23.14s-36.09-20.93-84.12-23.15h0Zm0,0h0Z" fill="white" fill-rule="evenodd" />
        </svg>
        0.5 USDT
      </div>
    </div>

    <!-- Verdict Node -->
    <div id="s2-verdict-node" class="node dark-node activate-node">
      <svg class="w-24 h-24 mb-4 text-orange-500" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 5L12 19L20 5" stroke="currentColor" stroke-width="4" stroke-miterlimit="10" stroke-linecap="butt" stroke-linejoin="miter" />
      </svg>
      <div class="text-3xl font-black tracking-tight">VERDICT</div>
      <div class="text-lg text-slate-400 mt-2 font-medium">ASP Engine</div>
    </div>

    <!-- The Action Card (Heavy Lifting) -->
    <div id="action-card">
      <div class="text-3xl font-black mb-8 border-b border-slate-200 pb-4">Agentic Audit</div>
      
      <div id="chk1" class="check-item">
        <div class="check-circle">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        Bypass bot protection
      </div>

      <div id="chk2" class="check-item">
        <div class="check-circle">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        Extract full DOM context
      </div>

      <div id="chk3" class="check-item">
        <div class="check-circle">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        Run 7-Pillar analysis
      </div>

    </div>
  </div>

  <!-- SCENE 5: Outro -->
  <div id="scene5" class="scene">
    <div id="s5-logo" class="w-48 h-48 bg-[#0B0F19] rounded-[40px] border-4 border-orange-500 flex items-center justify-center mb-12">
      <svg class="w-32 h-32 text-orange-500" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 5L12 19L20 5" stroke="currentColor" stroke-width="4" stroke-miterlimit="10" stroke-linecap="butt" stroke-linejoin="miter" />
      </svg>
    </div>
    <div id="s5-text" class="text-7xl font-black mb-6 tracking-tight">Equip your agent.</div>
    <div id="s5-cta" class="text-3xl font-medium text-slate-400">Available on OKX.AI</div>
  </div>

</body>
</html>
